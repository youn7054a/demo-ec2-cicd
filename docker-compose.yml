services:
  web:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.worker:celery_app worker --loglevel=info
    restart: always
    env_file: .env
    depends_on:
      - redis

  beat:
    build: .
    command: celery -A app.worker:celery_app beat --loglevel=info
    restart: always
    env_file: .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  caddy_data:
